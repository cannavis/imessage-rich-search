name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-build:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Compile-check all modules
        run: python -m compileall -q src

      - name: Smoke-test CLI help
        run: |
          imessage-rich-search --help
          imrs --help

  build-mcp:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install (no extras — stdlib only)
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Import MCP server module
        run: python -c "from imessage_rich_search import mcp_server; print(mcp_server.SERVER_NAME)"
      - name: Smoke-test JSON-RPC handshake
        run: |
          printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | imessage-rich-search-mcp \
            | python -c "import sys,json; lines=[l for l in sys.stdin if l.strip()]; assert json.loads(lines[0])['result']['serverInfo']['name']=='imessage-rich-search'; assert json.loads(lines[1])['result']['tools'][0]['name']=='search_imessages_rich'; print('handshake OK')"
